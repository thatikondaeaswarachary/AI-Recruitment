<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Recruitment Copilot</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (Development versions for CDN usage) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel for compiling JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Feather Icons (Lucide alternative for CDN) -->
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased p-8">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Dashboard() {
      useEffect(() => {
        // Initialize icons after render
        if (window.feather) {
          window.feather.replace();
        }
      });

      const stats = [
        { title: 'Total Candidates', value: '1,248', icon: 'users', color: 'text-blue-600', bg: 'bg-blue-100' },
        { title: 'Open Roles', value: '12', icon: 'briefcase', color: 'text-purple-600', bg: 'bg-purple-100' },
        { title: 'Avg Match Rate', value: '64%', icon: 'check-circle', color: 'text-green-600', bg: 'bg-green-100' },
        { title: 'Time to Hire', value: '18 Days', icon: 'clock', color: 'text-orange-600', bg: 'bg-orange-100' },
      ];

      return (
        <div className="max-w-7xl mx-auto space-y-8">
          <div className="glass-card rounded-2xl p-6 flex justify-between items-center mb-8">
            <h1 className="text-2xl font-bold flex items-center">
              <i data-feather="cpu" className="mr-3 text-blue-600"></i> AI Recruitment Copilot
            </h1>
          </div>

          <div>
            <h2 className="text-3xl font-bold text-gray-900 tracking-tight">Dashboard Overview</h2>
            <p className="text-gray-500 mt-1">Here's what's happening with your job postings today.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            {stats.map((stat, i) => (
              <div key={i} className="glass-card rounded-2xl p-6 flex items-center space-x-4 hover:shadow-lg transition-shadow duration-300">
                <div className={`p-4 rounded-xl ${stat.bg} ${stat.color}`}>
                  <i data-feather={stat.icon}></i>
                </div>
                <div>
                  <p className="text-sm font-medium text-gray-500">{stat.title}</p>
                  <h3 className="text-2xl font-bold text-gray-900">{stat.value}</h3>
                </div>
              </div>
            ))}
          </div>
          
          <div className="glass-card rounded-2xl p-8 mt-8">
             <h3 className="text-xl font-bold mb-4">Try it right now:</h3>
             <p className="text-gray-600 mb-4">Because the full React setup was failing, this is a standalone demo version that runs entirely in your browser without needing Node.js or a server!</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
